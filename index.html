<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">LividShop | Gaming Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');
        :root { --font-en: 'Inter', sans-serif; --font-ar: 'Tajawal', sans-serif; }
        .lang-ar { font-family: var(--font-ar); }
        .lang-en { font-family: var(--font-en); }
        .account-card { transition: all 0.3s ease; }
        .account-card:hover { transform: translateY(-8px); }
        .tab-btn.active { background-color: #4f46e5; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 lang-en">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="text-xl font-black">Livid<span class="text-indigo-600">Shop</span></h1>
            </div>
            <button onclick="toggleLanguage()" class="bg-slate-900 text-white px-5 py-2 rounded-full font-bold text-xs uppercase">
                <span id="lang-btn-text">العربية</span>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-slate-950 text-white py-12 text-center">
        <div class="container mx-auto px-4">
            <h2 id="hero-title" class="text-3xl md:text-5xl font-black mb-4">Gaming Marketplace</h2>
            <p id="hero-desc" class="text-slate-400 max-w-xl mx-auto italic">High quality accounts with instant delivery.</p>
        </div>
    </section>

    <!-- Category Tabs -->
    <div class="container mx-auto px-4 -mt-6 relative z-10">
        <div class="bg-white p-1.5 rounded-2xl shadow-lg border flex gap-2 max-w-sm mx-auto">
            <button onclick="switchTab('efootball')" id="tab-efootball" class="tab-btn active flex-1 py-3 rounded-xl font-bold text-sm transition-all">Efootball</button>
            <button onclick="switchTab('bountyrush')" id="tab-bountyrush" class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm text-slate-500 transition-all">Bounty Rush</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-12">
        <div id="loading" class="text-center py-20 text-slate-400">
            <i class="fas fa-circle-notch fa-spin text-3xl"></i>
        </div>
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 hidden">
            <!-- Products will load here -->
        </div>
    </main>

    <footer class="bg-white border-t py-10 text-center">
        <h4 id="footer-title" class="font-bold mb-6">Contact Us to Order</h4>
        <div class="flex justify-center gap-4">
            <a href="https://wa.me/9647805380508" class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp text-xl"></i></a>
            <a href="mailto:LividShop@gmail.com" class="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg"><i class="far fa-envelope text-xl"></i></a>
        </div>
        <p class="text-slate-400 text-xs mt-8">© 2024 LividShop</p>
    </footer>

    <script>
        let allProducts = {};
        let currentTab = 'efootball';
        let currentLang = 'en';

        const translations = {
            en: { hero_title: "Premium Accounts", hero_desc: "Choose your game and start winning.", lang_btn: "العربية", buy: "WhatsApp", buy_alt: "Gmail", android: "Android Only" },
            ar: { hero_title: "حسابات مميزة", hero_desc: "اختر لعبتك وابدأ الفوز الآن.", lang_btn: "English", buy: "واتساب", buy_alt: "إيميل", android: "أندرويد فقط" }
        };

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                allProducts = await response.json();
                render();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('products-grid').classList.remove('hidden');
            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById('loading').innerHTML = "Error loading products. Check products.json file.";
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-indigo-600', 'text-white');
                b.classList.add('text-slate-500');
            });
            const active = document.getElementById(`tab-${tab}`);
            active.classList.add('active');
            active.classList.remove('text-slate-500');
            render();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const isAr = currentLang === 'ar';
            document.getElementById('main-html').dir = isAr ? 'rtl' : 'ltr';
            document.body.className = `bg-slate-50 text-slate-900 lang-${currentLang}`;
            render();
        }

        function render() {
            const t = translations[currentLang];
            document.getElementById('lang-btn-text').innerText = t.lang_btn;
            document.getElementById('hero-title').innerText = t.hero_title;
            document.getElementById('hero-desc').innerText = t.hero_desc;

            const grid = document.getElementById('products-grid');
            const products = allProducts[currentTab] || [];

            grid.innerHTML = products.map(p => `
                <div class="account-card bg-white rounded-2xl border overflow-hidden flex flex-col shadow-sm">
                    <div class="relative aspect-video bg-slate-100">
                        <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x225?text=${currentTab}'">
                        <span class="absolute top-2 left-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded backdrop-blur-md uppercase font-bold">${t.android}</span>
                    </div>
                    <div class="p-5 flex-grow">
                        <h5 class="font-bold text-slate-800 mb-4">${p.title} ${p.info || ''}</h5>
                        <div class="text-indigo-600 font-black text-2xl mb-5">$${p.price}</div>
                        <div class="flex flex-col gap-2">
                            <a href="https://wa.me/9647805380508?text=Order:${p.title}%20Price:${p.price}" target="_blank" class="bg-green-500 text-white py-2.5 rounded-xl text-center font-bold text-sm hover:bg-green-600 transition">
                                <i class="fab fa-whatsapp mr-1"></i> ${t.buy}
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
