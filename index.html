<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Dynamic SEO Tags -->
    <title id="site-title">GoLivid Shop</title>
    <meta name="description" id="meta-desc" content="">
    <meta name="keywords" id="meta-keys" content="">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');
        .lang-ar { font-family: 'Tajawal', sans-serif; }
        .lang-en { font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); }
        #loading-screen { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 lang-en transition-all duration-300">

    <!-- Loading Spinner -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-indigo-600">Loading GoLivid Shop...</p>
    </div>

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white shadow-lg shadow-indigo-200">
                    <i class="fas fa-gamepad text-xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter">GoLivid<span class="text-indigo-600">Shop</span></span>
            </div>
            <button onclick="toggleLanguage()" class="flex items-center gap-2 px-5 py-2 bg-slate-900 text-white rounded-full font-bold hover:bg-indigo-600 transition-all text-sm">
                <i class="fas fa-language"></i>
                <span id="lang-btn-text">العربية</span>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-slate-950 text-white py-20 relative overflow-hidden">
        <div class="container mx-auto px-4 text-center relative z-10">
            <h1 id="hero-title" class="text-4xl md:text-6xl font-black mb-6">...</h1>
            <p id="hero-sub" class="text-slate-400 text-lg md:text-xl max-w-3xl mx-auto mb-10">...</p>
            <a href="#store" id="hero-btn" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-indigo-500 transition shadow-xl inline-block">Explore</a>
        </div>
    </section>

    <!-- Products Container -->
    <main class="container mx-auto px-4 py-16" id="store">
        <div class="flex items-center gap-4 mb-12">
            <div class="h-10 w-2 bg-indigo-600 rounded-full"></div>
            <h2 id="section-title" class="text-3xl font-bold">Available Accounts</h2>
        </div>
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-12 text-center">
        <p class="font-bold text-slate-800">GoLividShop@gmail.com | +964 780 538 0508</p>
        <p class="text-slate-400 text-xs mt-4">© 2024 GoLivid Store.</p>
    </footer>

    <script>
        let seo = {};
        let products = [];
        let lang = 'en';

        // وظيفة جلب البيانات من الملفات
        async function loadStore() {
            try {
                const [seoRes, prodRes] = await Promise.all([
                    fetch('seo.json'),
                    fetch('products.json')
                ]);
                seo = await seoRes.json();
                products = await prodRes.json();
                
                document.getElementById('loading-screen').style.display = 'none';
                updateUI();
            } catch (err) {
                console.error("Fetch error - This usually happens when opening local files directly. Try using a local server or upload to GitHub.");
                // عرض رسالة خطأ للمستخدم إذا لم تعمل الملفات
                document.getElementById('loading-screen').innerHTML = `
                    <div class="p-8 text-center">
                        <p class="text-red-500 font-bold mb-4">Error loading files!</p>
                        <p class="text-sm">Make sure seo.json and products.json are in the same folder.</p>
                    </div>
                `;
            }
        }

        function toggleLanguage() {
            lang = lang === 'en' ? 'ar' : 'en';
            updateUI();
        }

        function updateUI() {
            const isAr = lang === 'ar';
            const s = seo[lang];
            
            document.getElementById('main-html').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('main-html').lang = lang;
            document.body.className = `bg-slate-50 text-slate-900 lang-${lang}`;
            
            // SEO & Headings
            document.title = s.site_title;
            document.getElementById('meta-desc').content = s.meta_description;
            document.getElementById('meta-keys').content = s.meta_keywords;
            
            document.getElementById('lang-btn-text').innerText = isAr ? "English" : "العربية";
            document.getElementById('hero-title').innerText = s.hero_main_title;
            document.getElementById('hero-sub').innerText = s.hero_sub_title;
            document.getElementById('hero-btn').innerText = isAr ? "تصفح المتجر" : "Explore Shop";
            document.getElementById('section-title').innerText = isAr ? "الحسابات المتوفرة" : "Available Accounts";

            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const currency = lang === 'ar' ? "دينار" : "IQD";
            const btnText = lang === 'ar' ? "اطلب عبر واتساب" : "Buy via WhatsApp";

            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-3xl border border-slate-100 overflow-hidden flex flex-col h-full shadow-sm">
                    <img src="${p.image}" class="w-full h-56 object-cover" alt="${p['name_'+lang]}">
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="text-xl font-bold mb-2">${p['name_'+lang]}</h3>
                        <p class="text-slate-500 text-sm mb-6 flex-grow">${p['desc_'+lang]}</p>
                        <div class="mt-auto">
                            <div class="text-indigo-600 font-black text-2xl mb-4">${p.price} <span class="text-xs">${currency}</span></div>
                            <button onclick="orderWA('${p['name_'+lang]}', '${p.price}')" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition">
                                <i class="fab fa-whatsapp"></i> ${btnText}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function orderWA(name, price) {
            const msg = `Order: ${name} (${price})`;
            window.open(`https://wa.me/9647805380508?text=${encodeURIComponent(msg)}`, '_blank');
        }

        loadStore();
    </script>
</body>
</html>
